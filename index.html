<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>LiftLog</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏋️</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F0F10;--surface:#1A1A1C;--surface2:#252527;
  --border:#2C2C2E;--primary:#00E5FF;--secondary:#C3F400;
  --text:#F1F5F9;--text2:#94A3B8;--success:#C3F400;
  --danger:#ffb4ab;--warn:#FFC107;
  --radius:8px;--radius-lg:16px;--radius-full:9999px;--drawer-w:280px;
  --font-head:'Hanken Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:var(--font-body);
  background:var(--bg);color:var(--text);
  min-height:100dvh;overflow-x:hidden;
}
header{
  background:var(--surface);
  padding:14px 24px 10px;position:sticky;top:0;z-index:10;
  border-bottom:1px solid var(--border);
}
.header-top{display:flex;justify-content:space-between;align-items:center}
header h1{font-family:var(--font-head);font-size:20px;font-weight:800;letter-spacing:-0.3px}
header h1 span{color:var(--primary)}
header .sub{font-size:11px;color:var(--text2);margin-top:2px;font-family:var(--font-mono);letter-spacing:0.05em}
#menuBtn{
  background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;
  min-width:48px;min-height:48px;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
/* Drawer */
.drawer-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);z-index:99;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;top:0;right:-300px;width:var(--drawer-w);bottom:0;
  background:var(--surface);z-index:100;transition:right .3s ease;padding:24px 20px;
  overflow-y:auto;border-left:1px solid var(--border);
}
.drawer.open{right:0}
.drawer .dpic{
  width:52px;height:52px;border-radius:50%;background:var(--primary);color:#000;
  display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;margin-bottom:6px;
  font-family:var(--font-head);
}
.drawer .dname{font-size:16px;font-weight:600;font-family:var(--font-head)}
.drawer .dgoal{font-size:12px;color:var(--text2);margin-bottom:16px}
.drawer .dsep{height:1px;background:var(--border);margin:12px 0}
.drawer .dnav{margin-top:8px}
.drawer .dnav-item{
  display:flex;align-items:center;gap:12px;padding:12px 8px;border-radius:var(--radius);
  cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);
  transition:all .15s;min-height:48px;
  -webkit-tap-highlight-color:transparent;
}
.drawer .dnav-item:active{background:var(--surface2)}
.drawer .dnav-item.active{color:var(--primary);background:var(--surface2)}
/* Pages */
.page{display:none;padding:16px 24px;max-width:1200px;margin:0 auto}
.page.active{display:block}
.page-title{font-family:var(--font-head);font-size:24px;font-weight:800;margin-bottom:16px;letter-spacing:-0.02em}
/* Workout tabs */
.tabs{
  display:flex;gap:6px;padding:10px 24px;overflow-x:auto;
  scrollbar-width:none;-ms-overflow-style:none;
  position:sticky;top:66px;z-index:9;
  background:var(--bg);border-bottom:1px solid var(--border);
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;padding:8px 18px;border-radius:var(--radius-full);
  font-size:12px;font-weight:600;background:var(--surface2);
  color:var(--text2);cursor:pointer;border:1px solid transparent;
  transition:all .2s;white-space:nowrap;user-select:none;
  font-family:var(--font-body);
  -webkit-tap-highlight-color:transparent;
}
.tab.active{background:var(--primary);color:#000;border-color:var(--primary)}
.tab:active{transform:scale(.95)}
.day-section{display:none;padding:0}
.day-section.active{display:block}
.feel{
  font-size:13px;color:var(--text2);margin-bottom:16px;font-style:italic;
  padding:12px 16px;background:var(--surface);border-radius:var(--radius);
  border-left:2px solid var(--primary);line-height:1.5;
}
.exercise-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;margin-bottom:12px;
}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-header .ex-info{flex:1;min-width:0}
.exercise-name{font-family:var(--font-head);font-size:16px;font-weight:700;margin-bottom:2px}
.exercise-meta{font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.5}
.exercise-meta .alt{color:var(--primary);opacity:.8}
.delete-btn{
  background:none;border:none;color:var(--danger);font-size:22px;line-height:1;
  cursor:pointer;padding:4px;opacity:.5;transition:opacity .2s;
  -webkit-tap-highlight-color:transparent;flex-shrink:0;min-width:44px;min-height:44px;
}
.delete-btn:active{opacity:1}
.input-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.input-group{display:flex;align-items:center;gap:6px;flex:1}
.input-group label{font-size:11px;color:var(--text2);font-weight:600;white-space:nowrap;font-family:var(--font-mono);letter-spacing:0.1em;text-transform:uppercase}
.input-group input{
  width:80px;padding:10px 10px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text);font-size:15px;font-weight:600;outline:none;transition:border-color .2s;
  font-family:var(--font-mono);min-height:44px;
}
.input-group input:focus{border-color:var(--primary)}
.input-group input::placeholder{color:var(--text2);font-weight:400;font-size:11px;font-family:var(--font-body)}
.btn{
  padding:10px 18px;border:none;border-radius:var(--radius);
  font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
  -webkit-tap-highlight-color:transparent;user-select:none;min-height:44px;
  display:inline-flex;align-items:center;justify-content:center;
}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--primary);color:#000;font-family:var(--font-head)}
.btn-primary:hover{opacity:.9}
.btn-danger{background:var(--danger);color:#000;padding:8px 14px;font-size:12px;border-radius:var(--radius)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-outline:active{border-color:var(--primary);color:var(--primary)}
.history{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:24px}
.hist-pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 12px;border-radius:var(--radius-full);font-size:11px;font-weight:600;
  background:var(--surface2);color:var(--text2);font-family:var(--font-mono);letter-spacing:0.02em;
}
.hist-pill .val{color:var(--success)}
.hist-pill .vol{color:var(--primary);opacity:.8}
.video-toggle{
  display:flex;align-items:center;gap:6px;padding:8px 0;cursor:pointer;
  font-size:12px;color:var(--primary);user-select:none;min-height:44px;
  -webkit-tap-highlight-color:transparent;
}
.video-toggle .arrow{transition:transform .25s ease;font-size:10px}
.video-toggle.open .arrow{transform:rotate(90deg)}
.video-dropdown{
  max-height:0;overflow:hidden;transition:max-height .3s ease,opacity .25s ease,padding .25s ease;
  opacity:0;padding:0;
}
.video-dropdown.open{max-height:400px;opacity:1;padding-top:10px}
.video-container{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:var(--radius);background:#000}
.video-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.video-input-row{display:flex;gap:8px;margin-top:8px}
.video-input-row input{flex:1;padding:10px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;outline:none;min-width:0;min-height:44px}
.video-input-row input:focus{border-color:var(--primary)}
.video-link-display{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;color:var(--text2);word-break:break-all}
.video-link-display a{color:var(--primary);text-decoration:none}
.video-placeholder{font-size:12px;color:var(--text2);padding:14px;text-align:center;background:var(--surface2);border-radius:var(--radius)}
.add-exercise-btn{
  width:100%;padding:14px;border:2px dashed var(--border);border-radius:var(--radius-lg);
  background:transparent;color:var(--text2);font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;margin-top:16px;min-height:52px;
  -webkit-tap-highlight-color:transparent;
}
.add-exercise-btn:active{border-color:var(--primary);color:var(--primary);background:rgba(0,229,255,.05)}
.add-form{
  background:var(--surface);border:1px solid var(--primary);border-radius:var(--radius-lg);
  padding:20px;margin-top:16px;
}
.add-form .af-row{margin-bottom:12px}
.add-form label.d{display:block;font-size:12px;color:var(--text2);font-weight:500;margin-bottom:4px;font-family:var(--font-mono);letter-spacing:0.05em}
.add-form input[type="text"],.add-form input[type="number"]{
  width:100%;padding:10px 12px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;outline:none;min-height:44px;
}
.add-form input:focus{border-color:var(--primary)}
.add-form .af-check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);min-height:44px}
.add-form .af-check input{width:18px;height:18px;accent-color:var(--primary)}
.add-form .af-actions{display:flex;gap:8px;margin-top:16px}
.add-form .af-actions .btn{flex:1;text-align:center}
.c-exercise .exercise-name::after{content:' ✏️';font-size:12px;opacity:.5}
/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav button{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:8px 16px;min-height:48px;min-width:48px;-webkit-tap-highlight-color:transparent}
.cal-nav .cal-title{font-family:var(--font-head);font-size:18px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px}
.cal-hdr{text-align:center;font-size:11px;color:var(--text2);font-weight:600;padding:6px 0;font-family:var(--font-mono);letter-spacing:0.1em;text-transform:uppercase}
.cal-cell{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;
  transition:all .15s;position:relative;user-select:none;min-height:48px;
  font-family:var(--font-mono);-webkit-tap-highlight-color:transparent;
}
.cal-cell.other{color:var(--text2);opacity:.25}
.cal-cell.today{border:2px solid var(--primary)}
.cal-cell.workout{background:var(--success);color:#000}
.cal-cell.rest{background:var(--warn);color:#000}
.cal-cell.missed{background:var(--danger);color:#000}
.cal-cell:active{transform:scale(.88)}
.cal-stats{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--text2);margin-bottom:10px}
.cal-stats span{display:flex;align-items:center;gap:6px}
.cal-legend{display:flex;gap:16px;font-size:12px;color:var(--text2);flex-wrap:wrap}
.cal-legend span{display:flex;align-items:center;gap:6px}
.cal-legend .dot{width:12px;height:12px;border-radius:50%;display:inline-block}
/* Progress */
.progress-sel{margin-bottom:14px}
.progress-sel select{
  width:100%;padding:10px 12px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;outline:none;min-height:48px;
  font-family:var(--font-body);
}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.chart-wrap canvas{width:100%;height:auto;display:block}
.chart-empty{text-align:center;padding:48px 20px;color:var(--text2);font-size:14px}
/* Settings */
.setting-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px}
.setting-card h3{font-family:var(--font-head);font-size:15px;font-weight:700;margin-bottom:10px}
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.setting-row:last-child{margin-bottom:0}
.setting-row label{font-size:13px;color:var(--text2);font-family:var(--font-body)}
.setting-row input,.setting-row textarea{
  flex:1;max-width:200px;padding:8px 10px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;outline:none;text-align:right;
  font-family:var(--font-body);
}
.setting-row input:focus,.setting-row textarea:focus{border-color:var(--primary)}
.setting-row textarea{max-width:100%;text-align:left;resize:vertical;min-height:50px}
#fileInput{display:none}
.no-exercises{text-align:center;padding:48px 20px;color:var(--text2);font-size:14px}
/* Onboarding */
.onboard-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.onboard-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  max-width:400px;width:100%;padding:32px 24px 24px;text-align:center;
}
.onboard-card .ob-icon{font-size:48px;margin-bottom:12px}
.onboard-card .ob-title{font-family:var(--font-head);font-size:22px;font-weight:800;margin-bottom:8px}
.onboard-card .ob-desc{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:24px;font-family:var(--font-body)}
.onboard-card .ob-dots{display:flex;gap:6px;justify-content:center;margin-bottom:20px}
.onboard-card .ob-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s}
.onboard-card .ob-dot.active{background:var(--primary)}
.onboard-card .ob-actions{display:flex;gap:8px}
.onboard-card .ob-actions .btn{flex:1}
/* Toast */
#toast{font-family:var(--font-body);background:var(--surface);color:var(--text);border:1px solid var(--border)}
/* Responsive */
@media(min-width:768px){
  .page{padding:24px 32px}
  header{padding:16px 32px 12px}
  header h1{font-size:26px}
  .tabs{padding:12px 32px;justify-content:center}
  .exercise-card{padding:24px}
  .input-group input{width:100px;font-size:16px}
}
@media(min-width:1200px){
  .page{padding:32px 48px}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{transition-duration:0s!important;animation-duration:0s!important}
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>🏋️ <span>Lift</span>Log</h1>
    <button id="menuBtn">☰</button>
  </div>
  <div class="sub" id="weekDisplay"></div>
</header>

<div class="tabs" id="tabs"></div>

<div id="mainContent"></div>

<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer"></div>

<input type="file" id="fileInput" accept=".json">

<script>
const WORKOUT = [
  {day:"DAY 1 - PUSH",feel:"Pump in upper chest, side delts, and triceps",exercises:[
    {name:"Incline Dumbbell Press",reps:"4x10",alt:"Smith Incline Press"},
    {name:"Flat Bench Press",reps:"4x8-10",alt:"Chest Press Machine"},
    {name:"Machine Chest Fly",reps:"3x12",alt:"Cable Crossover"},
    {name:"Overhead Dumbbell Press",reps:"3x10",alt:"Seated Machine Press"},
    {name:"Dumbbell Lateral Raise",reps:"4x15",alt:"Cable Lateral Raise"},
    {name:"Triceps Pushdown",reps:"4x12",alt:"Overhead DB Extension"},
    {name:"Bench Dips",reps:"3 sets to failure",alt:"Assisted Dip Machine",bodyweight:true},
    {name:"Dead Hang",reps:"3x30 sec",alt:"",bodyweight:true}
  ]},
  {day:"DAY 2 - PULL",feel:"Squeeze in lats, burn in biceps",exercises:[
    {name:"Lat Pulldown",reps:"4x10",alt:"Band-Assisted Pull-Up"},
    {name:"Seated Cable Row",reps:"4x10",alt:"One Arm DB Row"},
    {name:"Rear Delt Fly",reps:"3x12",alt:"Face Pull"},
    {name:"Barbell Curl",reps:"4x10",alt:"EZ Bar or Dumbbell Curl"},
    {name:"Hammer Curl",reps:"3x12",alt:"Cable Rope Curl"},
    {name:"Shrugs",reps:"4x15",alt:""},
    {name:"Face Pulls",reps:"3x15",alt:""},
    {name:"Plank",reps:"3x30 sec",alt:"",bodyweight:true}
  ]},
  {day:"DAY 3 - CORE + CARDIO",feel:"Sweat, abs on fire, lungs working hard",exercises:[
    {name:"Hanging Leg Raise",reps:"4x15",alt:"Lying Leg Raise"},
    {name:"Weighted Decline Sit-Ups",reps:"4x12",alt:"Crunch Machine"},
    {name:"Cable Woodchoppers",reps:"3x12",alt:"Russian Twist"},
    {name:"Mountain Climbers",reps:"3x30 sec",alt:"",bodyweight:true},
    {name:"Bicycle Crunches",reps:"3x20",alt:"",bodyweight:true},
    {name:"High Knees",reps:"3x30 sec",alt:"",bodyweight:true},
    {name:"Plank with Shoulder Tap",reps:"3x30 sec",alt:"",bodyweight:true},
    {name:"Treadmill or Skipping",reps:"15 min high pace",alt:"",bodyweight:true}
  ]},
  {day:"DAY 4 - PUSH 2",feel:"Burn in side delts and triceps",exercises:[
    {name:"Standing Overhead Barbell Press",reps:"4x8",alt:"Machine Shoulder Press"},
    {name:"Arnold Press",reps:"3x10",alt:"DB Press Neutral Grip"},
    {name:"Cable Lateral Raise",reps:"3x12 each side",alt:""},
    {name:"Landmine Chest Press",reps:"3x10",alt:"Incline Machine Press"},
    {name:"Dumbbell Front Raise",reps:"3x12",alt:"Plate Raise"},
    {name:"Skull Crushers",reps:"3x10",alt:"DB Overhead Extension"},
    {name:"Rope Pushdowns",reps:"3x12",alt:""},
    {name:"Plank to Push-Up",reps:"3x10",alt:"",bodyweight:true}
  ]},
  {day:"DAY 5 - PULL 2",feel:"Pump in arms, lats stretched, rear delts engaged",exercises:[
    {name:"Pull-Ups",reps:"3x Max",alt:"Close-Grip Pulldown",bodyweight:true},
    {name:"Barbell Bent Row",reps:"4x8-10",alt:"Machine Row"},
    {name:"Concentration Curls",reps:"3x12",alt:""},
    {name:"Incline Dumbbell Curls",reps:"3x10",alt:"Cable Curl"},
    {name:"Cable Face Pulls",reps:"3x15",alt:""},
    {name:"Rear Delt Machine",reps:"3x12",alt:""},
    {name:"Barbell Shrugs",reps:"3x15",alt:"Trap Bar Shrugs"},
    {name:"Forearm Roller or Reverse Curls",reps:"3x12",alt:""}
  ]},
  {day:"DAY 6 - LEGS + NECK + FOREARMS",feel:"Strong foundation, balanced aesthetics",exercises:[
    {name:"Leg Press",reps:"4x10",alt:"Goblet Squat"},
    {name:"Seated Hamstring Curl",reps:"4x12",alt:"DB RDL"},
    {name:"Standing Calf Raise Machine",reps:"4x15",alt:""},
    {name:"Seated Calf Raise",reps:"4x15",alt:""},
    {name:"Neck Flexion",reps:"3x15",alt:""},
    {name:"Neck Extension",reps:"3x15",alt:"Resistance Band"},
    {name:"Wrist Curls",reps:"3x15",alt:""},
    {name:"Reverse Wrist Curls",reps:"3x15",alt:""}
  ]}
];

const STORAGE_KEY = 'liftlog_data';
let state = loadState();

function defaultState(){
  return {
    selectedDay:0, weightLogs:{}, videoLinks:{}, deletedExercises:{}, customExercises:{},
    attendance:{}, profile:{name:"Trainee",goal:"Build muscle, get stronger"},
    calendarYear:0, calendarMonth:-1, currentPage:"workout",
    deletedDays:[], customDays:[], showOnboard:true
  };
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const p = JSON.parse(raw);
      if(p&&typeof p==='object'){
        return {
          selectedDay:p.selectedDay??0, weightLogs:p.weightLogs??{},
          videoLinks:p.videoLinks??{}, deletedExercises:p.deletedExercises??{},
          customExercises:p.customExercises??{}, attendance:p.attendance??{},
          profile:p.profile??{name:"Trainee",goal:"Build muscle, get stronger"},
          calendarYear:p.calendarYear??0, calendarMonth:p.calendarMonth??-1,
          currentPage:p.currentPage??"workout",
          deletedDays:p.deletedDays??[], customDays:p.customDays??[],
          showOnboard:p.showOnboard??true, _chartMode:p._chartMode
        };
      }
    }
  }catch(e){}
  return defaultState();
}

function saveState(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}
}

function getWeekId(){
  const now=new Date();
  const s=new Date(now.getFullYear(),0,1);
  const d=(now-s+(s.getTimezoneOffset()-now.getTimezoneOffset())*60000)/86400000;
  return now.getFullYear()+'-W'+String(Math.ceil((d+s.getDay()+1)/7)).padStart(2,'0');
}

function fmtWeek(weekId){
  const p=weekId.split('-W');if(p.length!==2)return weekId;
  const m=new Date(new Date(parseInt(p[0]),0,1).getTime()+(parseInt(p[1])-1)*7*86400000);
  const d=m.getDay();m.setDate(m.getDate()-d+(d===0?-6:1));
  return m.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function getAllDays(){
  const del=state.deletedDays||[];
  const bi=WORKOUT.map((d,i)=>({...d,_key:'d_'+i,_isBuiltIn:true,_builtInIdx:i})).filter(d=>!del.includes(d._builtInIdx));
  const cu=(state.customDays||[]).map((d,i)=>({...d,_key:'dc_'+i,_isBuiltIn:false,_customIdx:i}));
  return[...bi,...cu];
}

function getExercisesForDay(di){
  const days=getAllDays();
  const day=days[di];if(!day)return[];
  if(day._isBuiltIn){
    const d=WORKOUT[day._builtInIdx];
    const del=state.deletedExercises[day._builtInIdx]||[];
    const bi=d.exercises.map((e,i)=>({...e,_key:day._builtInIdx+'_'+i,_isBuiltIn:true,_builtInIdx:i})).filter(e=>!del.includes(e._builtInIdx));
    const cu=(state.customExercises[day._builtInIdx]||[]).map((e,i)=>({...e,_key:day._builtInIdx+'_c_'+i,_isBuiltIn:false,_customIdx:i}));
    return[...bi,...cu];
  }else{
    return (day.exercises||[]).map((e,i)=>({...e,_key:'dc_'+day._customIdx+'_'+i,_isBuiltIn:false,_customIdx:i}));
  }
}

function getAllExercises(){
  const r=[];
  const days=getAllDays();
  days.forEach((d,di)=>{getExercisesForDay(di).forEach(e=>{r.push({...e,dayName:d.day})})});
  return r;
}

function getWeightLogs(k){return state.weightLogs[k]||[]}
function setWeightLogs(k,l){if(l.length===0)delete state.weightLogs[k];else state.weightLogs[k]=l;saveState()}
function getVideoLink(k){return state.videoLinks[k]||''}
function setVideoLink(k,u){if(u)state.videoLinks[k]=u;else delete state.videoLinks[k];saveState()}

function extractYouTubeId(url){
  if(!url)return null;
  const p=[/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,/^([a-zA-Z0-9_-]{11})$/];
  for(const r of p){const m=url.trim().match(r);if(m)return m[1]}
  return null;
}

function fmtW(w){const n=parseFloat(w);return isNaN(n)?w:n%1===0?n.toString():n.toFixed(1)}

const onbSteps=[
  {icon:'🏋️',title:'Welcome to LiftLog',desc:'Track your workouts week by week. Log weights and reps for every exercise, and watch your strength grow over time.'},
  {icon:'📅',title:'Track Attendance',desc:'Use the calendar to log workout days, rest days, and missed days. See your monthly consistency at a glance.'},
  {icon:'📈',title:'Progress Charts',desc:'View weight, rep, and volume trends over time. Every data point you log builds a chart of your progress.'},
  {icon:'⚙️',title:'Customize Your Plan',desc:'Add or remove exercises, create custom workout days, and export your data anytime. It\'s your workout — your way.'}
];
function renderOnboarding(){
  let step=0;
  const ov=document.createElement('div');
  ov.className='onboard-overlay';ov.id='onboardOverlay';
  function renderStep(){
    const s=onbSteps[step];
    ov.innerHTML='<div class="onboard-card"><div class="ob-icon">'+s.icon+'</div><div class="ob-title">'+s.title+'</div><div class="ob-desc">'+s.desc+'</div><div class="ob-dots">'+onbSteps.map((_,i)=>'<div class="ob-dot'+(i===step?' active':'')+'"></div>').join('')+'</div><div class="ob-actions">'+(step>0?'<button class="btn btn-outline" data-action="ob-prev">Back</button>':'')+'<button class="btn btn-primary" data-action="ob-next">'+(step<onbSteps.length-1?'Next':'Got it!')+'</button></div></div>';
  }
  renderStep();
  ov.addEventListener('click',e=>{
    const a=e.target.closest('[data-action]');
    if(!a)return;
    if(a.dataset.action==='ob-next'){
      if(step<onbSteps.length-1){step++;renderStep()}
      else{state.showOnboard=false;saveState();ov.remove()}
    }else if(a.dataset.action==='ob-prev'){
      if(step>0){step--;renderStep()}
    }
  });
  document.body.appendChild(ov);
}

function renderCalendar(){
  const now=new Date();
  let y=state.calendarYear||now.getFullYear();
  let m=state.calendarMonth;if(m<0)m=now.getMonth();
  state.calendarYear=y;state.calendarMonth=m;saveState();

  const el=document.getElementById('mainContent');
  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const first=new Date(y,m,1);
  const last=new Date(y,m+1,0);
  const startDay=first.getDay();
  const days=last.getDate();

  let html='<div class="page active">';
  html+='<div class="cal-nav"><button data-action="cal-prev">◀</button><span class="cal-title">'+monthNames[m]+' '+y+'</span><button data-action="cal-next">▶</button></div>';

  // Stats
  const all=state.attendance||{};
  let wc=0,rc=0,mc=0;
  for(const d in all){
    const dt=new Date(d+'T00:00:00');
    if(dt.getFullYear()===y&&dt.getMonth()===m){
      if(all[d]==='workout')wc++;else if(all[d]==='rest')rc++;else if(all[d]==='missed')mc++;
    }
  }
  html+='<div class="cal-stats"><span>✅ '+wc+' workout'+(wc!==1?'s':'')+'</span><span>🟡 '+rc+' rest</span><span>🔴 '+mc+' missed</span></div>';

  // Grid
  html+='<div class="cal-grid">';
  ['S','M','T','W','T','F','S'].forEach(d=>{html+='<div class="cal-hdr">'+d+'</div>'});

  const todayStr=new Date().toISOString().slice(0,10);
  for(let i=0;i<startDay;i++)html+='<div class="cal-cell other"></div>';

  for(let d=1;d<=days;d++){
    const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=ds===todayStr;
    const status=all[ds]||'';
    const cls='cal-cell'+(isToday?' today':'')+(status?' '+status:'');
    html+='<div class="'+cls+'" data-action="cal-day" data-date="'+ds+'">'+d+'</div>';
  }
  html+='</div>';

  html+='<div class="cal-legend"><span><span class="dot" style="background:var(--success)"></span> Workout</span><span><span class="dot" style="background:var(--warn)"></span> Rest</span><span><span class="dot" style="background:var(--danger)"></span> Missed</span><span><span class="dot" style="background:transparent;border:1px solid var(--border)"></span> Untracked</span></div>';
  html+='</div>';

}

// ─── PROGRESS PAGE ───
function renderProgress(){
  const el=document.getElementById('mainContent');
  const allEx=getAllExercises();
  if(allEx.length===0){el.innerHTML='<div class="page active"><div class="page-title">📈 Progress</div><div class="chart-empty">No exercises found.</div></div>';return}

  const selEx=state._progressKey||allEx[0]._key;
  if(!allEx.find(e=>e._key===selEx)){state._progressKey=allEx[0]._key;saveState()}

  let html='<div class="page active"><div class="page-title">📈 Progress</div>';
  html+='<div class="progress-sel"><select id="progSelect">';
  allEx.forEach(e=>{html+='<option value="'+e._key+'"'+(e._key===selEx?' selected':'')+'>'+esc(e.name)+' ('+esc(e.dayName.replace('DAY','').trim())+')</option>'});
  html+='</select></div>';

  const logs=getWeightLogs(selEx);
  const sorted=[...logs].sort((a,b)=>a.week.localeCompare(b.week));
  const hasV=sorted.some(l=>l.weight&&l.reps);
  const chartMode=state._chartMode||(hasV?'volume':'weight');
  html+='<div class="progress-sel"><select id="chartMode">';
  const modes=[{v:'weight',l:'Weight'},{v:'reps',l:'Reps'}];
  if(hasV)modes.push({v:'volume',l:'Volume'});
  modes.forEach(m=>{html+='<option value="'+m.v+'"'+(chartMode===m.v?' selected':'')+'>'+m.l+'</option>'});
  html+='</select></div>';

  if(sorted.length<2){
    html+='<div class="chart-empty">Log at least 2 weeks of data to see progress.</div></div>';
    el.innerHTML=html;
  }else{
    let field=chartMode;
    if(field==='volume')field='weight';
    const filt=sorted.filter(l=>{
      if(chartMode==='volume'){
        if(!l.weight||!l.reps)return false;
        const v=parseFloat(l.weight)*parseInt(l.reps);
        return !isNaN(v)&&v>0;
      }
      const v=field==='weight'?l.weight:parseInt(l.reps);
      return v&&!isNaN(v);
    });
    const vals=filt.map(l=>{
      if(chartMode==='volume')return parseFloat(l.weight)*parseInt(l.reps);
      return field==='weight'?l.weight:parseInt(l.reps);
    });

    // Summary stat
    const firstV=vals[0],lastV=vals[vals.length-1];
    const diff=lastV-firstV;
    const sign=diff>0?'+':'';
    const weeks=vals.length;
    const vLabel=chartMode==='volume'?'':(chartMode==='weight'?'kg':'');
    html+='<div style="display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;font-size:12px">';
    html+='<span style="color:var(--text2)">Weeks: <b style="color:var(--text)">'+weeks+'</b></span>';
    html+='<span style="color:var(--text2)">Start: <b style="color:var(--text)">'+(chartMode==='volume'?Math.round(firstV):fmtW(firstV)+vLabel)+'</b></span>';
    html+='<span style="color:var(--text2)">Latest: <b style="color:var(--success)">'+(chartMode==='volume'?Math.round(lastV):fmtW(lastV)+vLabel)+'</b></span>';
    html+='<span style="color:var(--text2)">Change: <b style="color:'+(diff>=0?'var(--success)':'var(--danger)')+'">'+sign+(chartMode==='volume'?Math.round(diff):fmtW(diff)+vLabel)+'</b></span>';
    html+='</div>';

    html+='<div class="chart-wrap"><canvas id="progCanvas" height="220"></canvas></div></div>';
    el.innerHTML=html;

    const canvas=document.getElementById('progCanvas');
    const ctx=canvas.getContext('2d');
    const W=canvas.parentElement.clientWidth-24;
    const H=220;const pad={top:20,bot:30,left:40,right:16};
    canvas.width=W;canvas.height=H;

    if(vals.length<2){ctx.fillStyle='#94a3b8';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.fillText('Not enough data to chart',W/2,H/2);return}

    const minV=Math.max(0,Math.min(...vals)*0.85);
    const maxV=Math.max(...vals)*1.12;
    const range=maxV-minV||1;
    const cw=W-pad.left-pad.right;
    const ch=H-pad.top-pad.bottom;
    const step=cw/(vals.length-1);

    // Grid lines
    ctx.strokeStyle='#2C2C2E';ctx.lineWidth=1;
    for(let i=0;i<=4;i++){
      const y=pad.top+ch*(i/4);
      ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
      const v=minV+range*(1-i/4);
      ctx.fillStyle='#94A3B8';ctx.font='9px Inter,sans-serif';ctx.textAlign='right';
      const lbl=chartMode==='volume'?Math.round(v).toString():chartMode==='weight'?fmtW(v)+'kg':Math.round(v).toString();
      ctx.fillText(lbl,pad.left-4,y+3);
    }

    // Line
    ctx.strokeStyle='#00E5FF';ctx.lineWidth=2.5;ctx.lineJoin='round';
    ctx.beginPath();
    vals.forEach((v,i)=>{const x=pad.left+i*step;const y=pad.top+ch*(1-(v-minV)/range);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
    ctx.stroke();

    // Dots + labels
    filt.forEach((l,i)=>{
      let v;
      if(chartMode==='volume')v=parseFloat(l.weight)*parseInt(l.reps);
      else v=field==='weight'?l.weight:parseInt(l.reps);
      const x=pad.left+i*step;const y=pad.top+ch*(1-(v-minV)/range);
      ctx.fillStyle='#00E5FF';ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fill();

      ctx.fillStyle='#94A3B8';ctx.font='8px Inter,sans-serif';ctx.textAlign='center';
      ctx.fillText(fmtWeek(l.week),x,H-4);
    });
  }

  document.getElementById('progSelect')?.addEventListener('change',function(){
    state._progressKey=this.value;saveState();render();
  });
  document.getElementById('chartMode')?.addEventListener('change',function(){
    state._chartMode=this.value;saveState();render();
  });
}

// ─── SETTINGS PAGE ───
function renderSettings(){
  const p=state.profile;
  const el=document.getElementById('mainContent');
  el.innerHTML=`
    <div class="page active">
      <div class="page-title">⚙️ Settings</div>

      <div class="setting-card">
        <h3>👤 Profile</h3>
        <div class="setting-row"><label>Name</label><input type="text" id="pf_name" value="${esc(p.name)}"></div>
        <div class="setting-row" style="flex-direction:column;align-items:stretch;gap:4px"><label>Goal</label><textarea id="pf_goal" rows="2">${esc(p.goal)}</textarea></div>
        <button class="btn btn-primary" id="pf_save" style="width:100%;margin-top:8px">Save Profile</button>
      </div>

      <div class="setting-card">
        <h3>💾 Data</h3>
        <button class="btn btn-primary" id="setExport" style="width:100%;margin-bottom:6px">📤 Export Data</button>
        <button class="btn btn-outline" id="setImport" style="width:100%;margin-bottom:6px">📥 Import Data</button>
        <button class="btn btn-danger" id="setClear" style="width:100%;margin-bottom:0;padding:8px;font-size:12px">🗑️ Clear All Data</button>
      </div>

      <div class="setting-card">
        <h3>ℹ️ About</h3>
        <p style="font-size:12px;color:var(--text2);line-height:1.5">
          <b>LiftLog</b> v1.0<br>
          Track your weekly workout progress.<br>
          All data is stored locally on your device.<br>
          Export to backup or transfer data.
        </p>
      </div>
    </div>
  `;

  document.getElementById('pf_save').addEventListener('click',()=>{
    state.profile.name=document.getElementById('pf_name').value.trim()||'Trainee';
    state.profile.goal=document.getElementById('pf_goal').value.trim()||'No goal set';
    saveState();renderDrawer();showToast('✅ Profile saved');
  });

  document.getElementById('setExport').addEventListener('click',()=>{
    const data={weightLogs:state.weightLogs,videoLinks:state.videoLinks,deletedExercises:state.deletedExercises,customExercises:state.customExercises};
    const json=JSON.stringify(data,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='liftlog-workout-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    showToast('✅ Workout data exported');
  });

  document.getElementById('setImport').addEventListener('click',()=>document.getElementById('fileInput').click());
  document.getElementById('setClear').addEventListener('click',()=>{
    if(!confirm('Delete ALL data? This cannot be undone.'))return;
    if(!confirm('Are you sure? All weights, videos, attendance, and custom exercises will be gone.'))return;
    state=defaultState();saveState();render();showToast('🗑️ All data cleared');
  });
}

document.getElementById('fileInput').addEventListener('change',function(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d||typeof d!=='object')throw new Error('Invalid');
      if(d.weightLogs)state.weightLogs=d.weightLogs;
      if(d.videoLinks)state.videoLinks=d.videoLinks;
      if(d.deletedExercises)state.deletedExercises=d.deletedExercises;
      if(d.customExercises)state.customExercises=d.customExercises;
      saveState();render();showToast('✅ Workout data imported ('+Object.keys(d.weightLogs||{}).length+' logged exercises)');
    }catch(err){showToast('❌ Invalid backup file')}
  };
  reader.readAsText(file);this.value='';
});

// ─── MENU / DRAWER ───
document.getElementById('menuBtn').addEventListener('click',openDrawer);
document.getElementById('drawerOverlay').addEventListener('click',closeDrawer);
document.getElementById('drawer').addEventListener('click',e=>{
  const t=e.target.closest('[data-action="nav"]');
  if(t)navigate(t.dataset.page);
});

// ─── TOAST ───
let toastTimer=null;
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){
    t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center';
    document.body.appendChild(t);
  }
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.style.opacity='0'},2000);
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ─── GLOBAL CLICK HANDLER (added once) ───
document.getElementById('mainContent').addEventListener('click',e=>{
  const t=e.target.closest('[data-action]');
  if(!t)return;
  const a=t.dataset.action;
  const el=document.getElementById('mainContent');
  const page=state.currentPage;

  if(page==='workout'){
    const sel=state.selectedDay;
    if(a==='log'){
      const key=t.dataset.key;
      const card=t.closest('.exercise-card');
      const wI=card.querySelector('[data-field="weight"]');
      const rI=card.querySelector('[data-field="reps"]');
      const wv=wI?wI.value.trim():'';const rv=rI?rI.value.trim():'';
      if(!wv&&!rv)return;
      const wk=getWeekId();const la=getWeightLogs(key);
      const i=la.findIndex(l=>l.week===wk);
      const en={week:wk};
      if(wv&&!isNaN(parseFloat(wv)))en.weight=parseFloat(wv);
      if(rv)en.reps=rv;
      if(i>=0)Object.assign(la[i],en);else la.push(en);
      setWeightLogs(key,la);
      showToast('✅ Logged'+(en.weight?' '+fmtW(en.weight)+'kg':'')+(en.reps?' ×'+en.reps:''));
      render();
    }else if(a==='del'){
      const key=t.dataset.key;
      const exercises=getExercisesForDay(sel);
      const ex=exercises.find(e=>e._key===key);
      if(!ex||!confirm('Delete "'+ex.name+'"?'))return;
      if(ex._isBuiltIn){const da=state.deletedExercises[sel]||[];if(!da.includes(ex._builtInIdx))state.deletedExercises[sel]=[...da,ex._builtInIdx]}
      else{const cu=state.customExercises[sel]||[];state.customExercises[sel]=cu.filter((_,i)=>i!==ex._customIdx)}
      saveState();render();
    }else if(a==='vtog'){
      const key=t.dataset.key;
      const dd=el.querySelector('[data-video="'+key+'"]');
      const o=dd&&dd.classList.contains('open');
      if(o){dd.classList.remove('open');t.classList.remove('open')}
      else if(dd){dd.classList.add('open');t.classList.add('open');renderVideoContent(dd,getVideoLink(key),key)}
    }else if(a==='add-ex'){
      showAddForm(el,sel);
    }else if(a==='save-video'){
      const dd=t.closest('.video-dropdown');
      if(!dd)return;
      const key=dd.dataset.video;const inp=dd.querySelector('[data-video-input]');
      const val=inp.value.trim();
      if(!val){setVideoLink(key,'');showToast('Video link removed');render();return}
      const id=extractYouTubeId(val);
      if(!id){showToast('❌ Invalid YouTube URL');return}
      setVideoLink(key,val);showToast('✅ Video link saved');render();
    }else if(a==='remove-video'){
      const dd=t.closest('.video-dropdown');if(!dd)return;
      setVideoLink(dd.dataset.video,'');showToast('Video link removed');render();
    }else if(a==='del-day'){
      const days=getAllDays();
      const day=days[sel];
      if(!day||!confirm('Delete "'+day.day+'" and all its data?'))return;
      if(day._isBuiltIn){
        const da=state.deletedDays||[];
        if(!da.includes(day._builtInIdx))state.deletedDays=[...da,day._builtInIdx];
        state.selectedDay=0;
      }else{
        state.customDays=(state.customDays||[]).filter((_,i)=>i!==day._customIdx);
      }
      saveState();render();
    }
  }

  if(a==='nav'){navigate(t.dataset.page);return}

  if(page==='calendar'){
    if(a==='cal-prev'){
      state.calendarMonth--;if(state.calendarMonth<0){state.calendarMonth=11;state.calendarYear--}
      render();
    }else if(a==='cal-next'){
      state.calendarMonth++;if(state.calendarMonth>11){state.calendarMonth=0;state.calendarYear++}
      render();
    }else if(a==='cal-day'){
      const ds=t.dataset.date;const att=state.attendance||{};
      const cur=att[ds]||'';
      const next=cur==='workout'?'rest':cur==='rest'?'missed':cur==='missed'?'':'workout';
      if(next)att[ds]=next;else delete att[ds];
      state.attendance=att;saveState();render();
    }
  }
});

render();
</script>
